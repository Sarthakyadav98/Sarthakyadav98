<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.2" fill="#161b22"/>
    </pattern>
    <radialGradient id="glowBg" cx="50%" cy="48%" r="65%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#38bdf8"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#2dd4bf"/></linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="a-indigo" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#818cf8"/></marker>
    <marker id="a-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/></marker>
    <marker id="a-sky" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#38bdf8"/></marker>
    <marker id="a-cyan" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/></marker>
    <marker id="a-teal" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2dd4bf"/></marker>
    <marker id="a-amber" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/></marker>
    <marker id="a-orange" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#fb923c"/></marker>
    <marker id="a-rose" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#f472b6"/></marker>

    <symbol id="icon-client" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="1.5" fill="none" stroke="#a78bfa" stroke-width="1.7"/><rect x="9" y="18" width="6" height="2" fill="#a78bfa"/><rect x="6" y="20.2" width="12" height="1.6" rx="0.8" fill="#a78bfa"/></symbol>
    <symbol id="icon-cdn" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#818cf8" stroke-width="1.6"/><ellipse cx="12" cy="12" rx="4" ry="9" fill="none" stroke="#818cf8" stroke-width="1.4"/><line x1="3" y1="12" x2="21" y2="12" stroke="#818cf8" stroke-width="1.4"/></symbol>
    <symbol id="icon-lb" viewBox="0 0 24 24"><circle cx="5" cy="5" r="1.9" fill="#60a5fa"/><circle cx="12" cy="5" r="1.9" fill="#60a5fa"/><circle cx="19" cy="5" r="1.9" fill="#60a5fa"/><circle cx="12" cy="19" r="2.2" fill="#60a5fa"/><line x1="5" y1="5" x2="12" y2="19" stroke="#60a5fa" stroke-width="1.4"/><line x1="12" y1="5" x2="12" y2="19" stroke="#60a5fa" stroke-width="1.4"/><line x1="19" y1="5" x2="12" y2="19" stroke="#60a5fa" stroke-width="1.4"/></symbol>
    <symbol id="icon-gateway" viewBox="0 0 24 24"><path d="M12,2 L20,5 V11 C20,17 12,22 12,22 C12,22 4,17 4,11 V5 Z" fill="none" stroke="#38bdf8" stroke-width="1.6"/><path d="M8,12 L11,15 L16,9" fill="none" stroke="#38bdf8" stroke-width="1.7"/></symbol>
    <symbol id="icon-auth" viewBox="0 0 24 24"><rect x="7" y="11" width="10" height="8" rx="1.5" fill="none" stroke="#22d3ee" stroke-width="1.7"/><path d="M9,11 V8 A3,3 0 0 1 15,8 V11" fill="none" stroke="#22d3ee" stroke-width="1.7"/><circle cx="12" cy="15" r="1.2" fill="#22d3ee"/></symbol>
    <symbol id="icon-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" fill="none" stroke="#22d3ee" stroke-width="1.7"/><path d="M4,21 C4,15 8,13 12,13 C16,13 20,15 20,21" fill="none" stroke="#22d3ee" stroke-width="1.7"/></symbol>
    <symbol id="icon-order" viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="12" rx="1" fill="none" stroke="#22d3ee" stroke-width="1.7"/><path d="M4,8 L12,3 L20,8" fill="none" stroke="#22d3ee" stroke-width="1.7"/></symbol>
    <symbol id="icon-broker" viewBox="0 0 24 24"><circle cx="12" cy="4.5" r="2.2" fill="#2dd4bf"/><circle cx="5" cy="18" r="2.2" fill="#2dd4bf"/><circle cx="19" cy="18" r="2.2" fill="#2dd4bf"/><line x1="12" y1="4.5" x2="5" y2="18" stroke="#2dd4bf" stroke-width="1.4"/><line x1="12" y1="4.5" x2="19" y2="18" stroke="#2dd4bf" stroke-width="1.4"/><line x1="5" y1="18" x2="19" y2="18" stroke="#2dd4bf" stroke-width="1.4"/></symbol>
    <symbol id="icon-cache" viewBox="0 0 24 24"><polygon points="13,2 5,13 11,13 9,22 19,9 13,9" fill="#fbbf24"/></symbol>
    <symbol id="icon-db" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="8" ry="3" fill="none" stroke="#fb923c" stroke-width="1.7"/><path d="M4 5 V17 A8 3 0 0 0 20 17 V5" fill="none" stroke="#fb923c" stroke-width="1.7"/></symbol>
    <symbol id="icon-storage" viewBox="0 0 24 24"><path d="M6,6 H18 L16,20 H8 Z" fill="none" stroke="#f472b6" stroke-width="1.7"/><ellipse cx="12" cy="6" rx="6" ry="1.8" fill="none" stroke="#f472b6" stroke-width="1.5"/></symbol>
  </defs>

  <rect x="1" y="1" width="798" height="418" rx="16" fill="#0d1117" stroke="#30363d"/>
  <rect x="1" y="1" width="798" height="418" rx="16" fill="url(#dots)" opacity="0.5"/>
  <ellipse cx="400" cy="230" rx="380" ry="230" fill="url(#glowBg)"/>
  <text x="20" y="26" font-family="'Fira Code', monospace" font-size="12" fill="#8b949e">// system architecture</text>

  <!-- Row A connectors -->
  <line x1="195" y1="93" x2="235" y2="93" stroke="url(#g1)" stroke-width="2" marker-end="url(#a-indigo)"/>
  <line x1="355" y1="93" x2="395" y2="93" stroke="url(#g2)" stroke-width="2" marker-end="url(#a-blue)"/>
  <line x1="535" y1="93" x2="575" y2="93" stroke="url(#g3)" stroke-width="2" marker-end="url(#a-sky)"/>

  <!-- Gateway -> Microservices (fold) -->
  <path d="M650,136 L650,175 L170,175 L170,245" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#a-cyan)"/>
  <circle cx="650" cy="175" r="2.5" fill="#38bdf8"/><circle cx="170" cy="175" r="2.5" fill="#38bdf8"/>

  <!-- Microservices -> Broker -->
  <line x1="270" y1="295" x2="310" y2="295" stroke="url(#g4)" stroke-width="2" marker-end="url(#a-teal)"/>

  <!-- Broker -> Data fan -->
  <line x1="480" y1="295" x2="520" y2="295" stroke="#2dd4bf" stroke-width="2"/>
  <line x1="520" y1="233" x2="520" y2="357" stroke="#3b4252" stroke-width="2"/>
  <line x1="520" y1="233" x2="530" y2="233" stroke="#fbbf24" stroke-width="2" marker-end="url(#a-amber)"/>
  <line x1="520" y1="295" x2="530" y2="295" stroke="#fb923c" stroke-width="2" marker-end="url(#a-orange)"/>
  <line x1="520" y1="357" x2="530" y2="357" stroke="#f472b6" stroke-width="2" marker-end="url(#a-rose)"/>
  <circle cx="520" cy="295" r="2.5" fill="#2dd4bf"/>

  <!-- animated particles -->
  <circle r="3" fill="#ffffff"><animateMotion dur="1.4s" begin="0s" repeatCount="indefinite" path="M195,93 L235,93"/></circle>
  <circle r="3" fill="#ffffff"><animateMotion dur="1.4s" begin="0.3s" repeatCount="indefinite" path="M355,93 L395,93"/></circle>
  <circle r="3" fill="#ffffff"><animateMotion dur="1.4s" begin="0.6s" repeatCount="indefinite" path="M535,93 L575,93"/></circle>
  <circle r="3" fill="#22d3ee"><animateMotion dur="2s" begin="0.2s" repeatCount="indefinite" path="M650,136 L650,175 L170,175 L170,245"/></circle>
  <circle r="3" fill="#2dd4bf"><animateMotion dur="1.4s" begin="0.5s" repeatCount="indefinite" path="M270,295 L310,295"/></circle>
  <circle r="3" fill="#fbbf24"><animateMotion dur="1.8s" begin="0.1s" repeatCount="indefinite" path="M480,295 L520,295 L520,233 L530,233"/></circle>
  <circle r="3" fill="#fb923c"><animateMotion dur="1.8s" begin="0.4s" repeatCount="indefinite" path="M480,295 L530,295"/></circle>
  <circle r="3" fill="#f472b6"><animateMotion dur="1.8s" begin="0.7s" repeatCount="indefinite" path="M480,295 L520,295 L520,357 L530,357"/></circle>

  <!-- Row A boxes -->
  <rect x="75" y="50" width="120" height="86" rx="10" fill="#161b22" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-client" x="124" y="60" width="22" height="22"/>
  <text x="135" y="108" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" font-weight="600" fill="#e6edf3">Client</text>
  <text x="135" y="126" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#7d8590">Web / Mobile</text>

  <rect x="235" y="50" width="120" height="86" rx="10" fill="#161b22" stroke="#818cf8" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-cdn" x="284" y="60" width="22" height="22"/>
  <text x="295" y="108" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" font-weight="600" fill="#e6edf3">CDN</text>
  <text x="295" y="126" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#7d8590">Edge Cache</text>

  <rect x="395" y="50" width="140" height="86" rx="10" fill="#161b22" stroke="#60a5fa" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-lb" x="454" y="60" width="22" height="22"/>
  <text x="465" y="108" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" font-weight="600" fill="#e6edf3">Load Balancer</text>
  <text x="465" y="126" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#7d8590">L4 / L7</text>

  <rect x="575" y="50" width="150" height="86" rx="10" fill="#161b22" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-gateway" x="639" y="60" width="22" height="22"/>
  <text x="650" y="108" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" font-weight="600" fill="#e6edf3">API Gateway</text>
  <text x="650" y="126" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#7d8590">Auth · Routing</text>

  <!-- Microservices -->
  <rect x="70" y="245" width="200" height="100" rx="10" fill="#161b22" stroke="#22d3ee" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-auth" x="121" y="257" width="18" height="18"/>
  <use href="#icon-user" x="161" y="257" width="18" height="18"/>
  <use href="#icon-order" x="201" y="257" width="18" height="18"/>
  <text x="170" y="317" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" font-weight="600" fill="#e6edf3">Microservices</text>
  <text x="170" y="335" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#7d8590">Auth · Users · Orders</text>

  <!-- Broker -->
  <rect x="310" y="252" width="170" height="86" rx="10" fill="#161b22" stroke="#2dd4bf" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-broker" x="384" y="262" width="22" height="22"/>
  <text x="395" y="310" text-anchor="middle" font-family="'Fira Code', monospace" font-size="14" font-weight="600" fill="#e6edf3">Message Broker</text>
  <text x="395" y="328" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#7d8590">Kafka · Pub/Sub</text>

  <!-- Data cluster -->
  <rect x="530" y="206" width="190" height="54" rx="9" fill="#161b22" stroke="#fbbf24" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-cache" x="546" y="212" width="16" height="16"/>
  <text x="633" y="230" text-anchor="middle" font-family="'Fira Code', monospace" font-size="12" font-weight="600" fill="#e6edf3">Cache</text>
  <text x="633" y="244" text-anchor="middle" font-family="'Fira Code', monospace" font-size="8.5" fill="#7d8590">Redis</text>

  <rect x="530" y="268" width="190" height="54" rx="9" fill="#161b22" stroke="#fb923c" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-db" x="546" y="274" width="16" height="16"/>
  <text x="633" y="292" text-anchor="middle" font-family="'Fira Code', monospace" font-size="12" font-weight="600" fill="#e6edf3">Relational DB</text>
  <text x="633" y="306" text-anchor="middle" font-family="'Fira Code', monospace" font-size="8.5" fill="#7d8590">PostgreSQL</text>

  <rect x="530" y="330" width="190" height="54" rx="9" fill="#161b22" stroke="#f472b6" stroke-width="1.5" filter="url(#glow)"/>
  <use href="#icon-storage" x="546" y="336" width="16" height="16"/>
  <text x="633" y="354" text-anchor="middle" font-family="'Fira Code', monospace" font-size="12" font-weight="600" fill="#e6edf3">Object Storage</text>
  <text x="633" y="368" text-anchor="middle" font-family="'Fira Code', monospace" font-size="8.5" fill="#7d8590">S3-compatible</text>
</svg>
