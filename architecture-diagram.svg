<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#58A6FF"/>
    </marker>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <symbol id="icon-client" viewBox="0 0 24 24">
      <rect x="2" y="3" width="20" height="14" rx="1.5" fill="none" stroke="#58A6FF" stroke-width="1.6"/>
      <rect x="9" y="18" width="6" height="2" fill="#58A6FF"/>
      <rect x="6" y="20.2" width="12" height="1.6" rx="0.8" fill="#58A6FF"/>
    </symbol>

    <symbol id="icon-api" viewBox="0 0 24 24">
      <text x="12" y="17" font-family="'Fira Code', monospace" font-size="15" fill="#58A6FF" text-anchor="middle">{ }</text>
    </symbol>

    <symbol id="icon-service" viewBox="0 0 24 24">
      <polygon points="12,2 20,6 20,14 12,18 4,14 4,6" fill="none" stroke="#58A6FF" stroke-width="1.6"/>
      <circle cx="12" cy="10" r="3" fill="#58A6FF"/>
    </symbol>

    <symbol id="icon-db" viewBox="0 0 24 24">
      <ellipse cx="12" cy="5" rx="8" ry="3" fill="none" stroke="#58A6FF" stroke-width="1.6"/>
      <path d="M4 5 V17 A8 3 0 0 0 20 17 V5" fill="none" stroke="#58A6FF" stroke-width="1.6"/>
      <path d="M4 11 A8 3 0 0 0 20 11" fill="none" stroke="#58A6FF" stroke-width="1.3" opacity="0.6"/>
    </symbol>

    <symbol id="icon-cache" viewBox="0 0 24 24">
      <polygon points="13,2 5,13 11,13 9,22 19,9 13,9" fill="#58A6FF"/>
    </symbol>

    <symbol id="icon-ws" viewBox="0 0 24 24">
      <path d="M4 15 Q12 3 20 15" fill="none" stroke="#58A6FF" stroke-width="1.6" opacity="0.35"/>
      <path d="M7 16 Q12 8 17 16" fill="none" stroke="#58A6FF" stroke-width="1.6" opacity="0.7"/>
      <circle cx="12" cy="18" r="2" fill="#58A6FF"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect x="1" y="1" width="898" height="578" rx="18" fill="#0d1117" stroke="#30363d"/>
  <text x="30" y="34" font-family="'Fira Code', monospace" font-size="14" fill="#8b949e">// system architecture</text>

  <!-- connecting lines -->
  <line x1="450" y1="134" x2="450" y2="188" stroke="#58A6FF" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="450" y1="254" x2="450" y2="308" stroke="#58A6FF" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="450" y1="374" x2="450" y2="420" stroke="#58A6FF" stroke-width="1.8"/>
  <line x1="175" y1="420" x2="735" y2="420" stroke="#58A6FF" stroke-width="1.8"/>
  <line x1="175" y1="420" x2="175" y2="458" stroke="#58A6FF" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="450" y1="420" x2="450" y2="458" stroke="#58A6FF" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="735" y1="420" x2="735" y2="458" stroke="#58A6FF" stroke-width="1.8" marker-end="url(#arrow)"/>
  <circle cx="450" cy="420" r="3" fill="#58A6FF"/>
  <circle cx="175" cy="420" r="3" fill="#58A6FF"/>
  <circle cx="735" cy="420" r="3" fill="#58A6FF"/>

  <!-- Client -->
  <rect x="350" y="70" width="200" height="64" rx="10" fill="#161b22" stroke="#58A6FF" stroke-width="1.6" filter="url(#glow)"/>
  <use href="#icon-client" x="438" y="78" width="24" height="24"/>
  <text x="450" y="122" text-anchor="middle" font-family="'Fira Code', monospace" font-size="15" font-weight="600" fill="#c9d1d9">Client</text>

  <!-- API -->
  <rect x="350" y="190" width="200" height="64" rx="10" fill="#161b22" stroke="#58A6FF" stroke-width="1.6" filter="url(#glow)"/>
  <use href="#icon-api" x="438" y="198" width="24" height="24"/>
  <text x="450" y="242" text-anchor="middle" font-family="'Fira Code', monospace" font-size="15" font-weight="600" fill="#c9d1d9">API</text>

  <!-- Service -->
  <rect x="330" y="310" width="240" height="64" rx="10" fill="#161b22" stroke="#58A6FF" stroke-width="1.6" filter="url(#glow)"/>
  <use href="#icon-service" x="438" y="318" width="24" height="24"/>
  <text x="450" y="362" text-anchor="middle" font-family="'Fira Code', monospace" font-size="15" font-weight="600" fill="#c9d1d9">Service</text>

  <!-- DB -->
  <rect x="90" y="460" width="170" height="74" rx="10" fill="#161b22" stroke="#58A6FF" stroke-width="1.6" filter="url(#glow)"/>
  <use href="#icon-db" x="163" y="470" width="24" height="24"/>
  <text x="175" y="518" text-anchor="middle" font-family="'Fira Code', monospace" font-size="15" font-weight="600" fill="#c9d1d9">DB</text>

  <!-- Cache -->
  <rect x="365" y="460" width="170" height="74" rx="10" fill="#161b22" stroke="#58A6FF" stroke-width="1.6" filter="url(#glow)"/>
  <use href="#icon-cache" x="438" y="470" width="24" height="24"/>
  <text x="450" y="518" text-anchor="middle" font-family="'Fira Code', monospace" font-size="15" font-weight="600" fill="#c9d1d9">Cache</text>

  <!-- WebSocket -->
  <rect x="640" y="460" width="190" height="74" rx="10" fill="#161b22" stroke="#58A6FF" stroke-width="1.6" filter="url(#glow)"/>
  <use href="#icon-ws" x="723" y="470" width="24" height="24"/>
  <text x="735" y="518" text-anchor="middle" font-family="'Fira Code', monospace" font-size="15" font-weight="600" fill="#c9d1d9">WebSocket</text>
</svg>
